        <h3>Historia de los conejos</h3>
        <p>Los primeros conejos silvestres de Europa evolucionaron durante 4.000 años en la Península Ibérica (la zona sombreada en rojo en el mapa de la derecha). Los comerciantes fenicios se refierían a la península como 'I-shephan-im', que significa 'tierra de conejos'. Esto se tradujo como 'Hispania' o, como se conoce actualmente, España. El nombre científico del conejo es \'Oryctolagus cuniculus\', parece muy complicado pero simplemente significa 'liebre que excava pasajes subterráneos'.</p>

        <p>La vida era tranquila para los conejos hasta que los romanos llegaron a España durante la Segunda Guerra Púnica en el siglo II a. C. Desafortunadamente para los conejos, los romanos rápidamente tuvieron la idea de criarlos para prácticar cunicultura. En un principio los criaban en zonas valladas con matorrales, pero utilizando las primeras tácticas de escape de prisión conocidas, los conejos se escapaban excavando túneles. No pasó mucho tiempo hasta que se decidió que cada recinto de conejos fuera vigilado como el propio palacio del emperador. ¿Crees que este uso poco prudente de centuriones podría haber contribuido, en cierta manera, a la caída del Imperio Romano?</p>
        <p>El aumento del comercio entre los países por mar y por tierra ayudó a introducir conejos en todos los continentes, excepto en la Antártida. Por aquel entonces la gente estaba mejorando la forma de cultivar, se cultivaba cada vez más tierra y los campos estaban llenos de alimentos. De este modo se ofrecía involuntariamente a los conejos un hábitat idea donde vivir. Esto, combinado con su famosa tasa de reproducción rápida, hizo que establecieron rápidamente dondequiera que iban.</p>
        <p>Se cree que los conejos se empezaron a domesticar cuando los monjes medievales los comenzaron a criar en jaulas para comer. Los conejos recién nacidos, gazapos, no se consideraban carne y se permitían comer durante la Cuaresma. Los monjes, que era muy aplicados, no tardaron en estudiar las razas y en seleccionarlas para obtener nuevos colores de pelaje.</p>
